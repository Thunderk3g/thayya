<!-- Poster frame for the hero film (shown until the video plays). Standalone
     asset; brand gradient hexes inlined. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f66917"/>
      <stop offset="0.45" stop-color="#bd23a2"/>
      <stop offset="1" stop-color="#07aeae"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.28" r="0.9">
      <stop offset="0" stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="0.7" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g fill="none" stroke="#fff" stroke-opacity="0.14" stroke-width="2">
    <circle cx="1040" cy="180" r="120"/><circle cx="1040" cy="180" r="200"/>
    <circle cx="1040" cy="180" r="280"/><circle cx="1040" cy="180" r="360"/>
  </g>
  <g transform="translate(640 360)" fill="#fff" opacity="0.10">
    <g>
      <ellipse rx="34" ry="120"/>
      <ellipse rx="34" ry="120" transform="rotate(30)"/>
      <ellipse rx="34" ry="120" transform="rotate(60)"/>
      <ellipse rx="34" ry="120" transform="rotate(90)"/>
      <ellipse rx="34" ry="120" transform="rotate(120)"/>
      <ellipse rx="34" ry="120" transform="rotate(150)"/>
    </g>
  </g>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <text x="90" y="470" font-family="Georgia, serif" font-size="120" font-weight="700" fill="#fff">Move. Rise. Shine.</text>
  <text x="96" y="540" font-family="Georgia, serif" font-size="34" fill="#fff" opacity="0.9" letter-spacing="6">SHOT AT THAYYA TRAININGS ACROSS INDIA</text>
</svg>
