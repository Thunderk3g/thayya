<!-- Thayya favicon. Standalone asset (no CSS vars available here), so the
     brand gradient hexes are inlined. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f66917"/>
      <stop offset="0.4" stop-color="#f04226"/>
      <stop offset="0.7" stop-color="#bd23a2"/>
      <stop offset="1" stop-color="#07aeae"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <g fill="#fff" opacity="0.18">
    <circle cx="16" cy="16" r="11" fill="none" stroke="#fff" stroke-width="1"/>
    <circle cx="16" cy="5.5" r="1.3"/><circle cx="16" cy="26.5" r="1.3"/>
    <circle cx="5.5" cy="16" r="1.3"/><circle cx="26.5" cy="16" r="1.3"/>
  </g>
  <text x="16" y="17" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" fill="#fff">T</text>
</svg>
